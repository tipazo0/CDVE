<div class="card">

<script src="script.js"></script>
 
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
 
<script>
  // ===== CONFIGURACIÓN =====
  // Mismos valores que pegaste en login.html
  const SUPABASE_URL = 'https://rjhhccpwdjpmflmqdnzo.supabase.co';
  const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_dOun6cNxLV-EzDWe5kgczQ_MMEuYzuC';
 
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
 
  const estadoCarga = document.getElementById('estado-carga');
  const estadoError = document.getElementById('estado-error');
  const contenido = document.getElementById('contenido');
 
  function mostrarError(msg) {
    estadoCarga.style.display = 'none';
    estadoError.style.display = 'block';
    estadoError.textContent = msg;
  }
 
  async function iniciar() {
    // Paso 1: preguntarle a Supabase si hay una sesión activa.
    // El cliente ya procesó automáticamente el token que venía en la URL
    // (el link del mail), así que si todo salió bien, acá ya hay sesión.
    const { data: { session } } = await supabaseClient.auth.getSession();
 
    // Paso 2: si no hay sesión, esto es una "ruta protegida" —
    // no dejamos ver el panel a nadie que no haya entrado por el login.
    if (!session) {
      window.location.href = 'login.html';
      return;
    }
 
    const email = session.user.email;
 
    // Paso 3: buscar en la tabla "socios" la fila que coincide con este email.
    // Gracias a la política de RLS que armamos, esta consulta SOLO puede
    // devolver la fila del propio usuario logueado, aunque no lo filtráramos
    // acá explícitamente — es la base de datos la que lo garantiza.
    const { data: socio, error } = await supabaseClient
      .from('socios')
      .select('nombre, actividad, estado_cuota, rol')
      .eq('email', email)
      .single();
 
    if (error || !socio) {
      mostrarError('Tu email todavía no está cargado como socio. Contactate con la secretaría del club.');
      return;
    }
 
    // Paso 4: mostrar los datos en pantalla.
    document.getElementById('dato-nombre').textContent = socio.nombre || '—';
    document.getElementById('dato-actividad').textContent = socio.actividad || '—';
 
    const badgeCuota = document.getElementById('dato-cuota');
    badgeCuota.textContent = socio.estado_cuota === 'al_dia' ? 'Al día' : 'Pendiente';
    badgeCuota.className = 'badge ' + (socio.estado_cuota === 'al_dia' ? 'al_dia' : 'pendiente');
 
    estadoCarga.style.display = 'none';
    contenido.style.display = 'block';
 
    // Solo mostramos el acceso al panel de admin si el rol lo habilita.
    // Esto es una comodidad visual, no la seguridad real: aunque alguien
    // fuerce ver este link, admin.html vuelve a verificar el rol por su
    // cuenta, y la base de datos lo bloquea de cualquier forma.
    if (socio.rol === 'admin') {
      document.getElementById('link-admin').style.display = 'block';
    }
  }
 
  document.getElementById('btn-salir').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });
 
  iniciar();
</script>
 
</body>
