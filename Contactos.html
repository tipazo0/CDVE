<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header class="header-chico">
      <div class="header-overlay">
        <h1>Contacto</h1>
      </div>
    </header>

    <nav>
      <div class="nav-contenido">
        <div class="nav-marca">
          <img src="imagenes/escudo.png" alt="Escudo" class="nav-escudo">
          <span class="nav-nombre">Club Tipazo</span>
        </div>
        <button class="nav-hamburguesa" onclick="toggleMenu()">☰</button>
        <div class="nav-links" id="nav-links">
          <a href="index.html">Inicio</a>
          <a href="actividades.html">Actividades</a>

        </div>
      </div>

   <section id="contacto">
     <h2>Contacto</h2>
    <div class="contacto-grid">

     <div class="contacto-info">
      <h3>Encontranos en</h3>
      <p>📍 Calle Falsa 123, La Plata, Buenos Aires</p>
      <p>📞 (221) 000-0000</p>
      <p>📧 contacto@clubtipazo.com</p>
     <div class="redes">
      <a href="https://instagram.com" target="_blank">Instagram general</a>
     </div>

     <h3 style="margin-top: 30px;">Escribinos</h3>
      <div class="formulario">
         <input type="text" placeholder="Tu nombre" id="nombre">
         <input type="email" placeholder="Tu email" id="email">
         <textarea placeholder="Tu mensaje" id="mensaje"></textarea>
         <button onclick="enviarFormulario()">Enviar mensaje</button>
         <p id="respuesta"></p>
        </div>
     </div>

     <div class="contacto-mapa">
       <iframe
         src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3271.2!2d-57.9533!3d-34.9214!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzTCsDU1JzE3LjAiUyA1N8KwNTcnMTIuMCJX!5e0!3m2!1ses!2sar"
         width="100%"
         height="300"
         style="border:0; border-radius: 10px;"
         allowfullscreen=""
         loading="lazy">
       </iframe>
     </div>

      </div>
    </section>

   <footer>
     <div class="footer-sponsors">
       <p class="footer-sponsors-label">Sponsors</p>
       <div class="footer-sponsors-logos">
         <img src="https://placehold.co/100x60/222/d4af37?text=Sponsor+1" alt="Sponsor Diamante 1">
         <img src="https://placehold.co/100x60/222/d4af37?text=Sponsor+2" alt="Sponsor Diamante 2">
         <img src="https://placehold.co/100x60/222/d4af37?text=Sponsor+3" alt="Sponsor Diamante 3">
       </div>
     </div>
      <p>© 2025 Club Tipazo</p>
    </footer>
